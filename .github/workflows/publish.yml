name: Stage npm package

on:
  # Test proposed workflow and package changes before they reach master.
  pull_request:
    branches: [master]

  # Stage future GitHub releases after they are published.
  release:
    types: [published]

  # Allow an existing version or commit to be staged manually.
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag, branch, or commit to stage
        required: true
        default: master

permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22", "24"]

    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          # Manual runs test the requested release source; other events test their native ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Enforce code coverage
        if: matrix.node-version == '24'
        run: npm run coverage:check

      - name: Validate TypeScript declarations
        if: matrix.node-version == '24'
        run: npm run typecheck

  stage:
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing through OIDC.

    steps:
      - name: Select source reference
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_REF: ${{ inputs.ref }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "ref=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$MANUAL_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      # npm staged publishing requires npm 11.15.0 or newer.
      - name: Install supported npm version
        run: npm install --global "npm@^11.15.0"

      - name: Verify package version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version=$(node --print "require('./package.json').version")

          if [[ "$EVENT_NAME" == "release" ]]; then
            tag_version="${RELEASE_TAG#v}"
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "Release tag $RELEASE_TAG does not match package version $package_version." >&2
              exit 1
            fi
          fi

          if npm view "passport-custom@$package_version" version >/dev/null 2>&1; then
            echo "passport-custom@$package_version already exists on npm." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Stage package on npm
        # Keep the existing stable release on `latest` until 1.2.0 is verified.
        run: npm stage publish --tag next

version: 2
updates:
  # Keep runtime and development dependencies current in small, reviewable PRs.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Track pinned GitHub Actions revisions separately from npm dependencies.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
